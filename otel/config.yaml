receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 256

exporters:
  # Studio's tracing endpoint — wire up after confirming Studio's OTEL ingest URL
  otlphttp/studio:
    endpoint: http://studio:3000/api/otel
    tls:
      insecure: true

  # Console exporter for local debugging
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/studio, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
