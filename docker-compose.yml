name: atom

# ── Operator-mode docker-compose ────────────────────────────────────────────────
# Pulls pre-built images from GHCR. No local build required.
#
# Quick start:
#   cp .env.example .env          # fill in GEMINI_API_KEY at minimum
#   make generate-keys            # create .keys/ JWT key pair (once)
#   docker compose up -d
#   docker compose exec atom-studio-api migrate up   # first run only
#
# Access:
#   atom-studio:  http://localhost:3000   (admin@atom.local / admin123)
#   Grafana:      http://localhost:3005   (admin / atom-grafana-dev)
#   MinIO:        http://localhost:9001   (minioadmin / changeme)
#
# To build from source instead, use docker-compose.dev.yml.

services:

  # ── Postgres 16 with pgvector ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: atom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: atom
      POSTGRES_USER: atom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atom"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: atom-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO (audit archive) ─────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: atom-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: atom-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-changeme};
        mc mb --ignore-existing local/atom-audit;
        mc mb --ignore-existing local/atom-policies;
        echo 'MinIO buckets ready';
      "

  # ── Redpanda (Kafka-compatible broker) ────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: atom-redpanda
    restart: unless-stopped
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092,EXTERNAL://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-init:
    image: redpandadata/redpanda:latest
    container_name: atom-redpanda-init
    restart: "no"
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        rpk topic create atom.audit atom.llm atom.agent.logs atom.deployments
          --brokers redpanda:9092 2>/dev/null || true;
        echo 'Kafka topics ready';
      "

  # ── OPA (policy engine) ───────────────────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:latest-rootless
    container_name: atom-opa
    restart: unless-stopped
    command: run --server --addr 0.0.0.0:8181
    ports:
      - "8181:8181"

  # ── GATE ─────────────────────────────────────────────────────────────────────
  gate:
    image: ghcr.io/shreyasy2k/atom-gate:latest
    platform: linux/amd64
    container_name: atom-gate
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    env_file: .env
    environment:
      DATABASE_URL: postgresql://atom:${POSTGRES_PASSWORD:-changeme}@postgres:5432/atom?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      KAFKA_BROKERS: redpanda:9092
      ATOM_LLM_URL: http://atom-llm:4000
      ATOM_STUDIO_API_URL: http://atom-studio-api:3001
      OPA_BUNDLE_PATH: /policies
      JWT_PUBLIC_KEY_PATH: /etc/atom/jwt_public.pem
      JWT_PRIVATE_KEY_PATH: /etc/atom/jwt_private.pem
      GATE_PORT: "8080"
      GATE_ENV: production
      # GATE's Go OTEL SDK expects host:port (no scheme); override .env which has http:// prefix
      OTEL_EXPORTER_OTLP_ENDPOINT: alloy:4318
    volumes:
      - ./.keys:/etc/atom:ro
      - ./policies:/policies:ro
    ports:
      - "8080:8080"

  # ── atom-llm (LiteLLM gateway) ────────────────────────────────────────────────
  atom-llm:
    image: ghcr.io/shreyasy2k/atom-llm:latest
    platform: linux/amd64
    container_name: atom-llm
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    env_file: .env
    environment:
      DATABASE_URL: postgresql://atom:${POSTGRES_PASSWORD:-changeme}@postgres:5432/atom
      KAFKA_BROKERS: redpanda:9092
      STORE_MODEL_IN_DB: "False"
      DISABLE_SPEND_LOGS: "True"
      # Override .env so Python OTEL exporter reaches alloy inside Docker (not localhost)
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
    ports:
      - "4000:4000"

  # ── atom-studio API ───────────────────────────────────────────────────────────
  atom-studio-api:
    image: ghcr.io/shreyasy2k/atom-studio-api:latest
    platform: linux/amd64
    container_name: atom-studio-api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    env_file: .env
    environment:
      DATABASE_URL: postgresql://atom:${POSTGRES_PASSWORD:-changeme}@postgres:5432/atom?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      ATOM_LLM_URL: http://atom-llm:4000
      ATOM_RUNTIME_URL: http://atom-runtime:8090
      KAFKA_BROKERS: redpanda:9092
      JWT_PRIVATE_KEY_PATH: /etc/atom/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: /etc/atom/jwt_public.pem
      # Override .env so Python OTEL exporter reaches alloy inside Docker (not localhost)
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
    volumes:
      - ./.keys:/etc/atom:ro
    ports:
      - "3001:3001"

  # ── atom-studio UI ────────────────────────────────────────────────────────────
  atom-studio-ui:
    image: ghcr.io/shreyasy2k/atom-studio-ui:latest
    platform: linux/amd64
    container_name: atom-studio-ui
    restart: unless-stopped
    depends_on:
      - atom-studio-api
    ports:
      - "3000:3000"

  # ── atom-runtime ──────────────────────────────────────────────────────────────
  atom-runtime:
    image: ghcr.io/shreyasy2k/atom-runtime:latest
    platform: linux/amd64
    container_name: atom-runtime
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    env_file: .env
    environment:
      DATABASE_URL: postgresql://atom:${POSTGRES_PASSWORD:-changeme}@postgres:5432/atom?sslmode=disable
      ATOM_STUDIO_API_URL: http://atom-studio-api:3001
      # Self-URL used when registering with atom-studio; must be the docker service name.
      # Without this the default is http://localhost:8090 which resolves inside atom-studio's
      # own container (wrong host) and trigger_deployment silently fails.
      ATOM_RUNTIME_SELF_URL: http://atom-runtime:8090
      RUNTIME_BACKEND: docker
      DOCKER_NETWORK: atom_default
      DOCKER_AGENT_GATE_URL: http://gate:8080
      # Override .env so Python OTEL exporter reaches alloy inside Docker (not localhost)
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_SERVICE_NAME: atom-runtime
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8090:8090"

  # ── log-archiver (Kafka → MinIO) ──────────────────────────────────────────────
  log-archiver:
    image: ghcr.io/shreyasy2k/atom-log-archiver:latest
    platform: linux/amd64
    container_name: atom-log-archiver
    restart: unless-stopped
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      KAFKA_BROKERS: redpanda:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-changeme}
      MINIO_BUCKET_AUDIT: atom-audit

  # ── Observability ─────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: atom-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki

  tempo:
    image: grafana/tempo:latest
    container_name: atom-tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"

  alloy:
    image: grafana/alloy:latest
    container_name: atom-alloy
    restart: unless-stopped
    command: run /etc/alloy/config.alloy --storage.path=/tmp/alloy
    depends_on:
      - loki
      - tempo
    volumes:
      - ./infra/alloy:/etc/alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "4319:4317"
      - "4320:4318"
      - "12345:12345"

  grafana:
    image: grafana/grafana:latest
    container_name: atom-grafana
    restart: unless-stopped
    depends_on:
      - loki
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: atom-grafana-dev
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    ports:
      - "3005:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

volumes:
  postgres_data:
  redis_data:
  minio_data:
  redpanda_data:
  loki_data:
  tempo_data:
  grafana_data:
