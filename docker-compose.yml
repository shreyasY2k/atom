# Atom Agent Platform — production stack
# =========================================
# Two surfaces: Agent Builder + Workflow Composer.
# Engine: Temporal for workflows, AgentScope Runtime for agents.
# Gemini-only. AgentScope/ReMe/Studio built from source.

name: atom

services:

  # ============================================================
  # GATEWAY LAYER
  # ============================================================
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    ports: ["4000:4000"]
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-master-change-me}
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY:-sk-salt-change-me}
      - DATABASE_URL=postgresql://litellm:litellm@litellm-db:5432/litellm
      - STORE_MODEL_IN_DB=True
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - AWS_REGION_NAME=us-east-1
      - LITELLM_LOG=INFO
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]
    depends_on:
      litellm-db: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    networks: [agentnet]

  litellm-db:
    image: postgres:16
    container_name: litellm-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=litellm
      - POSTGRES_DB=litellm
    volumes: ["litellm-db-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      retries: 10
    networks: [agentnet]

  # ============================================================
  # WORKFLOW ENGINE — Temporal (official image)
  # ============================================================
  temporal:
    image: temporalio/auto-setup:1.25.0
    container_name: temporal
    restart: unless-stopped
    ports: ["7233:7233"]
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/config/dynamicconfig/development-sql.yaml
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    depends_on:
      temporal-db: { condition: service_healthy }
    networks: [agentnet]

  temporal-db:
    image: postgres:16
    container_name: temporal-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=temporal
    volumes: ["temporal-db-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      retries: 10
    networks: [agentnet]

  temporal-ui:
    image: temporalio/ui:2.31.0
    container_name: temporal-ui
    restart: unless-stopped
    ports: ["8233:8080"]
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:5173
    depends_on:
      - temporal
    networks: [agentnet]

  # ============================================================
  # STORAGE
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports: ["9000:9000", "9001:9001"]
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes: ["minio-data:/data"]
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5
    networks: [agentnet]

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb --with-lock local/audit-logs || true;
      mc retention set --default COMPLIANCE 90d local/audit-logs || true;
      mc mb local/agent-artifacts || true;
      mc mb local/workflow-artifacts || true;
      mc mb local/specs || true;
      mc mb local/uploaded-documents || true;
      mc mb local/atom-deployments || true;
      echo 'minio buckets ready';
      "
    networks: [agentnet]

  # ============================================================
  # OBSERVABILITY (built from source)
  # ============================================================
  studio:
    build:
      context: ./dockerfiles/agentscope-studio
      args:
        STUDIO_GIT_REF: ${AGENTSCOPE_STUDIO_GIT_REF:-main}
    container_name: studio
    restart: unless-stopped
    ports: ["3000:3000"]
    networks: [agentnet]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: unless-stopped
    ports: ["4317:4317", "4318:4318"]
    volumes: ["./otel/config.yaml:/etc/otel-collector-config.yaml:ro"]
    command: ["--config=/etc/otel-collector-config.yaml"]
    depends_on: [tempo]
    networks: [agentnet]

  # ============================================================
  # OBSERVABILITY STACK — Prometheus + Loki + Tempo + Grafana + Alloy
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: unless-stopped
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    networks: [agentnet]

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    restart: unless-stopped
    ports: ["3100:3100"]
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    command: ["-config.file=/etc/loki/config.yaml"]
    networks: [agentnet]

  tempo:
    image: grafana/tempo:2.4.2
    container_name: tempo
    restart: unless-stopped
    ports: ["3200:3200"]
    volumes:
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    networks: [agentnet]

  grafana:
    image: grafana/grafana:10.4.3
    container_name: grafana
    restart: unless-stopped
    ports: ["3001:3000"]
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor metricsSummary
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_LOG_LEVEL=warn
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [loki, tempo]
    networks: [agentnet]

  alloy:
    image: grafana/alloy:v1.3.1
    container_name: alloy
    restart: unless-stopped
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["run", "--server.http.listen-addr=0.0.0.0:12345", "/etc/alloy/config.alloy"]
    depends_on: [loki, tempo]
    networks: [agentnet]
    privileged: true   # required for Docker socket access on some hosts

  # ============================================================
  # MEMORY (ReMe, built from source)
  # ============================================================
  reme:
    build:
      context: ./dockerfiles/reme
      args:
        REME_GIT_REF: ${REME_GIT_REF:-v0.3.1.8}
    container_name: reme
    restart: unless-stopped
    ports: ["8002:8002"]
    environment:
      # Standard OpenAI env vars (read by the openai Python client)
      - OPENAI_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-sk-master-change-me}
      # FlowLLM-specific env vars (Application.llm_api_base/key → these env vars)
      - FLOW_LLM_BASE_URL=http://litellm:4000/v1
      - FLOW_EMBEDDING_BASE_URL=http://litellm:4000/v1
      - FLOW_LLM_API_KEY=${LITELLM_MASTER_KEY:-sk-master-change-me}
      - REME_DB_URL=postgresql://reme:reme@reme-db:5432/reme
      - REME_VECTOR_STORE=chroma
      - REME_EMBEDDING_MODEL=gemini-embedding
      - REME_LLM_MODEL=gemini-3-flash
    volumes:
      - reme-data:/app/.reme
      # Mount our config to BOTH the path passed via --config and the
      # path flowllm actually loads (--config flag is silently ignored).
      - ./reme/config.yaml:/app/config.yaml:ro
      - ./reme/config.yaml:/src/reme_ai/config/default.yaml:ro
      # Provide the .env file flowllm's load_env looks for in cwd (/app).
      - ./reme/.env:/app/.env:ro
    depends_on:
      - litellm
      - reme-db
    networks: [agentnet]

  reme-db:
    image: postgres:16
    container_name: reme-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=reme
      - POSTGRES_PASSWORD=reme
      - POSTGRES_DB=reme
    volumes: ["reme-db-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reme"]
      interval: 5s
      retries: 10
    networks: [agentnet]

  # ============================================================
  # AGENT RUNTIME (built from source)
  # ============================================================
  runtime-sandbox:
    build:
      context: ./dockerfiles/agentscope-runtime-sandbox
      args:
        AGENTSCOPE_RUNTIME_GIT_REF: ${AGENTSCOPE_RUNTIME_GIT_REF:-main}
    image: atom-runtime-sandbox
    container_name: runtime-sandbox
    restart: unless-stopped
    ports: ["8001:8000"]
    environment:
      - CONTAINER_DEPLOYMENT=docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox-workspace:/workspace
    networks: [agentnet]

  # ============================================================
  # MOCK SERVICES — Payment demo (active)
  # ============================================================
  kyc-svc:       { build: { context: ./mocks/kyc_svc },       container_name: kyc-svc,       ports: ["8095:8095"], networks: [agentnet], restart: unless-stopped }
  ofac-svc:      { build: { context: ./mocks/ofac_svc },      container_name: ofac-svc,      ports: ["8096:8096"], networks: [agentnet], restart: unless-stopped }
  swift-gw:      { build: { context: ./mocks/swift_gw },      container_name: swift-gw,      ports: ["8097:8097"], networks: [agentnet], restart: unless-stopped }
  task-queue:    { build: { context: ./mocks/task_queue },     container_name: task-queue,    ports: ["8098:8098"], networks: [agentnet], restart: unless-stopped }
  fraud-svc:     { build: { context: ./mocks/fraud_svc },      container_name: fraud-svc,     ports: ["8102:8102"], networks: [agentnet], restart: unless-stopped }
  incoming-queue: { build: { context: ./mocks/incoming_queue }, container_name: incoming-queue, ports: ["8101:8099"], networks: [agentnet], restart: unless-stopped }

  # ============================================================
  # MOCK SERVICES — Archived (not needed for payment demo)
  # ============================================================
  # treasury-dw:  { build: { context: ./mocks/treasury_dw },   container_name: treasury-dw,   ports: ["8090:8090"], networks: [agentnet], restart: unless-stopped }
  # market-data:  { build: { context: ./mocks/market_data },   container_name: market-data,   ports: ["8091:8091"], networks: [agentnet], restart: unless-stopped }
  # lcr-engine:   { build: { context: ./mocks/lcr_engine },    container_name: lcr-engine,    ports: ["8092:8092"], networks: [agentnet], restart: unless-stopped }
  # fnol-svc:     { build: { context: ./mocks/fnol_svc },      container_name: fnol-svc,      ports: ["8093:8093"], networks: [agentnet], restart: unless-stopped }
  # ocr-svc:      { build: { context: ./mocks/ocr_svc },       container_name: ocr-svc,       ports: ["8094:8094"], networks: [agentnet], restart: unless-stopped }
  # securities-ops: { build: { context: ./mocks/securities_ops }, container_name: securities-ops, ports: ["8099:8099"], networks: [agentnet], restart: unless-stopped }

  # ============================================================
  # PLATFORM DATABASE
  # ============================================================
  platform-db:
    image: postgres:16
    container_name: platform-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=atom
      - POSTGRES_PASSWORD=atom
      - POSTGRES_DB=atom
    volumes: ["platform-db-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atom"]
      interval: 5s
      retries: 10
    networks: [agentnet]

  # ============================================================
  # PLATFORM
  # ============================================================

  # GATE — Go reverse-proxy that owns all external runtime traffic.
  # Takes over ports 8080 and 8081. Backends are internal-only.
  gate:
    build: { context: ./gate }
    container_name: gate
    restart: unless-stopped
    ports: ["8080:8080", "8081:8081"]
    environment:
      - BUILDER_BACKEND_URL=http://builder-backend:8080
      - WORKFLOW_BACKEND_URL=http://workflow-backend:8081
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    depends_on:
      builder-backend: { condition: service_started }
      workflow-backend: { condition: service_started }
      minio: { condition: service_started }
    networks: [agentnet]

  builder-backend:
    build:
      context: .
      dockerfile: builder-backend/Dockerfile
    container_name: builder-backend
    restart: unless-stopped
    # No host port — external traffic enters via gate only.
    environment:
      - LITELLM_BASE_URL=http://litellm:4000
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-master-change-me}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - REME_URL=http://reme:8002
      - RUNTIME_SANDBOX_URL=http://runtime-sandbox:8000
      - SKILLS_PATH=/app/skills
      - AGENT_ROLES_PATH=/app/agent-roles
      - AGENTSCOPE_SKILLS_PATH=/app/packages/agentscope_skills
      - SPECS_PATH=/app/specs
      # Mock service URLs available to deployed agents
      - TREASURY_DW_URL=http://treasury-dw:8090
      - MARKET_DATA_URL=http://market-data:8091
      - LCR_ENGINE_URL=http://lcr-engine:8092
      - FNOL_SVC_URL=http://fnol-svc:8093
      - OCR_SVC_URL=http://ocr-svc:8094
      - KYC_SVC_URL=http://kyc-svc:8095
      - OFAC_SVC_URL=http://ofac-svc:8096
      - SWIFT_GW_URL=http://swift-gw:8097
      - SECURITIES_OPS_URL=http://securities-ops:8099
      - FRAUD_SVC_URL=http://fraud-svc:8102
      - STUDIO_URL=http://studio:3000
      - WORKFLOW_BACKEND_URL=http://workflow-backend:8081
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - DATABASE_URL=postgresql://atom:atom@platform-db:5432/atom
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./skills:/app/skills
      - ./agent-roles:/app/agent-roles
      - ./packages:/app/packages
      - ./specs:/app/specs
      - builder-workdir:/work
    depends_on:
      litellm: { condition: service_started }
      minio: { condition: service_started }
      reme: { condition: service_started }
      platform-db: { condition: service_healthy }
    networks: [agentnet]

  workflow-backend:
    build: { context: ./workflow-backend }
    container_name: workflow-backend
    restart: unless-stopped
    # No host port — external traffic enters via gate only.
    environment:
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - LITELLM_BASE_URL=http://litellm:4000
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-master-change-me}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - BUILDER_BACKEND_URL=http://builder-backend:8080
      - TASK_QUEUE_URL=http://task-queue:8098
      - SPECS_PATH=/app/specs
      - SKILLS_PATH=/app/skills
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - DATABASE_URL=postgresql://atom:atom@platform-db:5432/atom
    volumes:
      - ./specs:/app/specs
      - ./skills:/app/skills:ro
    depends_on:
      temporal: { condition: service_started }
      builder-backend: { condition: service_started }
      task-queue: { condition: service_started }
      platform-db: { condition: service_healthy }
    networks: [agentnet]

  frontend:
    build: { context: ./frontend }
    container_name: frontend
    restart: unless-stopped
    ports: ["5173:5173"]
    environment:
      - VITE_BUILDER_API_URL=http://localhost:8080
      - VITE_WORKFLOW_API_URL=http://localhost:8081
      - VITE_STUDIO_URL=http://localhost:3000
      - VITE_TEMPORAL_UI_URL=http://localhost:8233
    depends_on:
      - gate
    networks: [agentnet]

volumes:
  litellm-db-data:
  temporal-db-data:
  platform-db-data:
  reme-db-data:
  reme-data:
  minio-data:
  sandbox-workspace:
  builder-workdir:
  loki-data:
  tempo-data:
  grafana-data:
  prometheus-data:

networks:
  agentnet:
    driver: bridge
