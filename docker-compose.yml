name: atom

# ── Operator-mode docker-compose ────────────────────────────────────────────────
# Pulls pre-built images from a container registry. No local build required.
#
# Quick start:
#   cp .env.example .env          # fill in GEMINI_API_KEY at minimum
#   make generate-keys            # create .keys/ JWT key pair (once)
#   docker compose up -d
#
# Access:
#   atom-studio:  http://localhost:3000   (admin@atom.local / admin123)
#   Grafana:      http://localhost:3005   (admin / atom-grafana-dev)
#   MinIO:        http://localhost:9001   (minioadmin / changeme)
#
# Registry:
#   Default:  ghcr.io/shreyasy2k  (GitHub Container Registry — no login needed)
#
# To build from source instead, use docker-compose.dev.yml.

services:

  # ── Postgres 16 with pgvector ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: atom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: atom
      POSTGRES_USER: atom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atom -d atom && psql -U atom -d atom -tc \"SELECT 1 FROM pg_extension WHERE extname='vector'\" | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ── DB migrations (auto-run on every start; idempotent) ──────────────────────
  migrate:
    image: migrate/migrate:v4.18.1
    container_name: atom-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      atom-llm:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    entrypoint: ["/bin/sh"]
    command:
      - "-c"
      - |
        n=0
        until [ $$n -ge 10 ]; do
          /usr/local/bin/migrate -path=/migrations \
            -database "postgresql://atom:${POSTGRES_PASSWORD:-changeme}@postgres:5432/atom?sslmode=disable" \
            up && exit 0
          n=$$(($$n+1))
          echo "Migration attempt $$n failed, retrying in 3s..."
          sleep 3
        done
        echo "Migrations failed after 10 attempts"
        exit 1

  # ── Dev seed (admin@atom.local / admin123) ────────────────────────────────────
  seed:
    image: pgvector/pgvector:pg16
    container_name: atom-seed
    restart: "no"
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./migrations/seed_dev.sql:/seed_dev.sql:ro
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-changeme}
    entrypoint: ["psql", "-h", "postgres", "-U", "atom", "-d", "atom", "-f", "/seed_dev.sql"]

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: atom-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO (audit archive) ─────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: atom-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: atom-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-changeme};
        mc mb --ignore-existing local/atom-audit;
        mc mb --ignore-existing local/atom-policies;
        echo 'MinIO buckets ready';
      "

  # ── Redpanda (Kafka-compatible broker) ────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: atom-redpanda
    restart: unless-stopped
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --kafka-addr INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr INTERNAL://redpanda:9092,EXTERNAL://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-init:
    image: redpandadata/redpanda:latest
    container_name: atom-redpanda-init
    restart: "no"
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        rpk topic create atom.audit atom.llm atom.agent.logs atom.deployments
          --brokers redpanda:9092 2>/dev/null || true;
        echo 'Kafka topics ready';
      "

  # ── OPA (policy engine) ───────────────────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:latest-rootless
    container_name: atom-opa
    restart: unless-stopped
    command:
      - run
      - --server
      - --watch
      - --log-format=json
      - --ignore=..*
      - /policies/base
    ports:
      - "8181:8181"
    volumes:
      - ./policies:/policies:ro

  # ── GATE ─────────────────────────────────────────────────────────────────────
  gate:
    image: ${ATOM_IMAGE_REGISTRY:-ghcr.io/shreyasy2k}/atom-gate:${ATOM_IMAGE_TAG:-latest}
    platform: linux/amd64
    container_name: atom-gate
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    env_file: .env
    environment:
      DATABASE_URL: postgresql://atom:${POSTGRES_PASSWORD:-changeme}@postgres:5432/atom?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      KAFKA_BROKERS: redpanda:9092
      ATOM_LLM_URL: http://atom-llm:4000
      ATOM_STUDIO_API_URL: http://atom-studio-api:3001
      OPA_BUNDLE_PATH: /policies
      JWT_PUBLIC_KEY_PATH: /etc/atom/jwt_public.pem
      JWT_PRIVATE_KEY_PATH: /etc/atom/jwt_private.pem
      GATE_PORT: "8080"
      GATE_ENV: production
      # GATE's Go OTEL SDK expects host:port (no scheme); override .env which has http:// prefix
      OTEL_EXPORTER_OTLP_ENDPOINT: alloy:4318
      OTEL_SERVICE_NAME: gate
    volumes:
      - ./.keys:/etc/atom:ro
      - ./policies:/policies:ro
    ports:
      - "8080:8080"

  # ── atom-llm (LiteLLM gateway) ────────────────────────────────────────────────
  atom-llm:
    image: ${ATOM_IMAGE_REGISTRY:-ghcr.io/shreyasy2k}/atom-llm:${ATOM_IMAGE_TAG:-latest}
    platform: linux/amd64
    container_name: atom-llm
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    env_file: .env
    environment:
      DATABASE_URL: postgresql://atom:${POSTGRES_PASSWORD:-changeme}@postgres:5432/atom
      KAFKA_BROKERS: redpanda:9092
      STORE_MODEL_IN_DB: "False"
      DISABLE_SPEND_LOGS: "True"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_SERVICE_NAME: atom-llm
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── atom-studio API ───────────────────────────────────────────────────────────
  atom-studio-api:
    image: ${ATOM_IMAGE_REGISTRY:-ghcr.io/shreyasy2k}/atom-studio-api:${ATOM_IMAGE_TAG:-latest}
    platform: linux/amd64
    container_name: atom-studio-api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      seed:     { condition: service_completed_successfully }
    env_file: .env
    environment:
      DATABASE_URL: postgresql://atom:${POSTGRES_PASSWORD:-changeme}@postgres:5432/atom?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      ATOM_LLM_URL: http://atom-llm:4000
      ATOM_RUNTIME_URL: http://atom-runtime:8090
      KAFKA_BROKERS: redpanda:9092
      JWT_PRIVATE_KEY_PATH: /etc/atom/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: /etc/atom/jwt_public.pem
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_SERVICE_NAME: atom-studio
    volumes:
      - ./.keys:/etc/atom:ro
      - ./migrations:/migrations:ro
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  # ── atom-studio UI ────────────────────────────────────────────────────────────
  atom-studio-ui:
    image: ${ATOM_IMAGE_REGISTRY:-ghcr.io/shreyasy2k}/atom-studio-ui:${ATOM_IMAGE_TAG:-latest}
    platform: linux/amd64
    container_name: atom-studio-ui
    restart: unless-stopped
    depends_on:
      - atom-studio-api
    ports:
      - "3000:3000"

  # ── atom-runtime ──────────────────────────────────────────────────────────────
  atom-runtime:
    image: ${ATOM_IMAGE_REGISTRY:-ghcr.io/shreyasy2k}/atom-runtime:${ATOM_IMAGE_TAG:-latest}
    platform: linux/amd64
    container_name: atom-runtime
    restart: unless-stopped
    depends_on:
      postgres:         { condition: service_healthy }
      atom-studio-api:  { condition: service_healthy }
    env_file: .env
    environment:
      DATABASE_URL: postgresql://atom:${POSTGRES_PASSWORD:-changeme}@postgres:5432/atom?sslmode=disable
      ATOM_STUDIO_API_URL: http://atom-studio-api:3001
      ATOM_RUNTIME_SELF_URL: http://atom-runtime:8090
      ATOM_GATE_CLUSTER_URL: http://gate:8080
      RUNTIME_BACKEND: docker
      DOCKER_NETWORK: atom_default
      DOCKER_AGENT_GATE_URL: http://gate:8080
      KAFKA_BROKERS: redpanda:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_SERVICE_NAME: atom-runtime
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8090:8090"

  # ── log-archiver (Kafka → MinIO) ──────────────────────────────────────────────
  log-archiver:
    image: ${ATOM_IMAGE_REGISTRY:-ghcr.io/shreyasy2k}/atom-log-archiver:${ATOM_IMAGE_TAG:-latest}
    platform: linux/amd64
    container_name: atom-log-archiver
    restart: unless-stopped
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      KAFKA_BROKERS: redpanda:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-changeme}
      MINIO_BUCKET_AUDIT: atom-audit

  # ── Observability ─────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: atom-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki

  tempo:
    image: grafana/tempo:latest
    container_name: atom-tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
      - "4319:4317"   # OTLP gRPC (external — internal services use alloy:4317)

  alloy:
    image: grafana/alloy:latest
    container_name: atom-alloy
    restart: unless-stopped
    command: run /etc/alloy/config.alloy --storage.path=/tmp/alloy
    depends_on:
      - loki
      - tempo
    volumes:
      - ./infra/alloy:/etc/alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "4317:4317"   # OTLP gRPC (← services send traces here via alloy:4317)
      - "4318:4318"   # OTLP HTTP  (← services send traces here via alloy:4318)
      - "12345:12345" # Alloy UI

  prometheus:
    image: prom/prometheus:latest
    container_name: atom-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: atom-grafana
    restart: unless-stopped
    depends_on:
      - loki
      - tempo
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: atom-grafana-dev
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    ports:
      - "3005:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

volumes:
  postgres_data:
    external: true
    name: atom-postgres-data
  redis_data:
  minio_data:
  redpanda_data:
  loki_data:
  tempo_data:
  grafana_data:
  prometheus_data:
