name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  ORG: ${{ github.repository_owner }}

jobs:
  # ── Docker images → GHCR ────────────────────────────────────────────────────
  docker:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: atom-gate
            context: gate
            dockerfile: gate/Dockerfile
          - name: atom-llm
            context: atom-llm
            dockerfile: atom-llm/Dockerfile.dev
          - name: atom-studio-api
            context: atom-studio/backend
            dockerfile: atom-studio/backend/Dockerfile
          - name: atom-studio-ui
            context: atom-studio/frontend
            dockerfile: atom-studio/frontend/Dockerfile
          - name: atom-log-archiver
            context: infra/log-archiver
            dockerfile: infra/log-archiver/Dockerfile
          - name: atom-runtime
            context: atom-runtime/runtime
            dockerfile: atom-runtime/runtime/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.7.1

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5.6.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6.9.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry-based cache: BuildKit fetches only the layer manifest from
          # GHCR (fast), then pulls individual blobs only for layers that changed.
          # When no image exists yet there is nothing to fetch — same fast path
          # as a cold build. Avoids the GHA cache blob download overhead that
          # made builds with existing images take 15+ min.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.name }}:latest
          cache-to: type=inline
          platforms: ${{ startsWith(github.ref, 'refs/tags/') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}

  # ── CLI binaries → GitHub Release ──────────────────────────────────────────
  # This job only runs on version tags (e.g. v0.1.0), not on every main push.
  # To publish a CLI release: git tag v0.1.0 && git push --tags
  cli:
    name: Release atom CLI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: atom-cli/go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
