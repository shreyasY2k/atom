name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: gate/go.mod
          cache: true
      - run: cd gate && go test ./... -race -count=1
      - run: cd atom-cli && go test ./... -race -count=1

  test-python-studio:
    name: atom-studio tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Generate JWT key pair for tests
        run: |
          mkdir -p .keys
          openssl genrsa -out .keys/jwt_private.pem 2048
          openssl rsa -in .keys/jwt_private.pem -pubout -out .keys/jwt_public.pem
      - run: |
          uv run --project atom-studio/backend \
            --with pytest-asyncio \
            python -m pytest atom-studio/backend/src/tests/ -q

  test-python-runtime:
    name: atom-runtime tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: |
          uv run --project atom-runtime/runtime \
            --with pytest-asyncio \
            python -m pytest atom-runtime/runtime/tests/ -q

  test-opa:
    name: OPA policy tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: open-policy-agent/setup-opa@v2
        with:
          version: latest
      - run: opa test policies/ -v

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: gate/go.mod
      - run: cd gate && go vet ./...
      - run: cd atom-cli && go vet ./...
      - uses: astral-sh/setup-uv@v5
      - run: uv run --with ruff ruff check atom-studio/ atom-runtime/runtime/ infra/log-archiver/
