repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        language: system
        entry: bash -c 'gofmt -l -w $(git diff --cached --name-only | grep "\.go$") 2>/dev/null; true'
        pass_filenames: false
        files: ^(gate|atom-cli)/.*\.go$

      - id: go-vet
        name: go vet
        language: system
        entry: bash -c 'cd gate && go vet ./... && cd ../atom-cli && go vet ./...'
        pass_filenames: false
        files: ^(gate|atom-cli)/.*\.go$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        files: ^atom-llm/|^atom-sdk/|^atom-runtime/|^atom-memory/|^atom-studio/
      - id: ruff-format
        files: ^atom-llm/|^atom-sdk/|^atom-runtime/|^atom-memory/|^atom-studio/

  - repo: local
    hooks:
      - id: opa-fmt
        name: opa fmt
        language: system
        entry: opa fmt -w
        files: \.rego$
        pass_filenames: true

      - id: opa-check
        name: opa check
        language: system
        entry: opa check
        files: \.rego$
        pass_filenames: false
        args: [policies/]

      - id: eslint
        name: eslint (atom-studio frontend)
        language: system
        entry: bash -c 'cd atom-studio/frontend && npm run lint'
        pass_filenames: false
        files: ^atom-studio/frontend/src/.*\.(ts|tsx)$

      - id: pytest-studio
        name: pytest (atom-studio)
        language: system
        entry: bash -c 'uv run --project atom-studio/backend --with pytest-asyncio python -m pytest atom-studio/backend/src/tests/ -q'
        pass_filenames: false
        files: ^atom-studio/
