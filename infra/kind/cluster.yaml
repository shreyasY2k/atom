kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: atom

# 1 control-plane (also handles nginx-ingress on ports 80/443)
# 2 workers for workload
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP

  - role: worker
  - role: worker
