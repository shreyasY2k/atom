apiVersion: 1

# Datasource provisioning used by docker-compose dev.
# k8s uses grafana-values.yaml (same structure, different hostnames).

datasources:
  # ── Loki — log aggregation ─────────────────────────────────────────────────
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 5000
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"trace_id":"(\w+)"'
          name: TraceID
          url: "$${__value.raw}"

  # ── Tempo — distributed tracing ────────────────────────────────────────────
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: true
    jsonData:
      httpMethod: GET
      nodeGraph:
        enabled: true
      traceToLogs:
        datasourceUid: loki
        tags: [service, container]
        filterByTraceID: true
        filterBySpanID: false
      lokiSearch:
        datasourceUid: loki

  # ── Alloy — self-observability metrics ─────────────────────────────────────
  - name: Alloy
    type: prometheus
    uid: alloy
    access: proxy
    url: http://alloy:12345
    isDefault: false
    editable: true
