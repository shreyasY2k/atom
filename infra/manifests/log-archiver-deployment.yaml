---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-archiver
  namespace: atom-system
  labels:
    app: log-archiver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-archiver
  template:
    metadata:
      labels:
        app: log-archiver
    spec:
      containers:
        - name: log-archiver
          image: atom-log-archiver:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: atom-credentials
            - configMapRef:
                name: atom-cluster-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
