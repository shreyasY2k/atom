apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-archiver
  namespace: atom-system
  labels:
    app: log-archiver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-archiver
  template:
    metadata:
      labels:
        app: log-archiver
    spec:
      containers:
        - name: log-archiver
          image: atom-log-archiver:local
          imagePullPolicy: IfNotPresent
          # MINIO_ACCESS_KEY, MINIO_SECRET_KEY injected via atom-credentials (from .env)
          envFrom:
            - secretRef:
                name: atom-credentials
          env:
            - name: KAFKA_BROKERS
              value: redpanda.atom-infra.svc.cluster.local:9092
            - name: MINIO_ENDPOINT
              value: http://minio.atom-infra.svc.cluster.local:9000
            - name: MINIO_BUCKET
              value: atom-audit
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 10
            periodSeconds: 30
