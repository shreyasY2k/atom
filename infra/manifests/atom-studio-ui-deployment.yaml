---
# atom-studio-ui-deployment.yaml
# Nginx serving the React SPA. Proxies /api/ and /ws/ to atom-studio-api.
# Build: docker build -t atom-studio-ui:local atom-studio/frontend/

apiVersion: apps/v1
kind: Deployment
metadata:
  name: atom-studio-ui
  namespace: atom-system
  labels:
    app: atom-studio-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atom-studio-ui
  template:
    metadata:
      labels:
        app: atom-studio-ui
    spec:
      containers:
        - name: atom-studio-ui
          image: atom-studio-ui:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: atom-studio-ui
  namespace: atom-system
  labels:
    app: atom-studio-ui
spec:
  selector:
    app: atom-studio-ui
  ports:
    - port: 3000
      targetPort: 3000
      name: http
