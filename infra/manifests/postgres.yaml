---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: atom-infra
type: Opaque
stringData:
  POSTGRES_PASSWORD: "changeme"
  POSTGRES_USER: atom
  POSTGRES_DB: atom

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: atom-infra
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS vector;
    CREATE EXTENSION IF NOT EXISTS pg_trgm;

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: atom-infra
  labels:
    app: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: atom-infra
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext: {}
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
            - name: run
              mountPath: /var/run/postgresql
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pg_isready -U atom -d atom && psql -U atom -d atom -tc \"SELECT 1 FROM pg_extension WHERE extname='vector'\" | grep -q 1"
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            exec:
              command: [pg_isready, -U, atom, -d, atom]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init
        - name: run
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
