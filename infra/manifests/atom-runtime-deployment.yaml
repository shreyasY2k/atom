---
# ServiceAccount + RBAC so atom-runtime can create/patch Deployments, Services,
# Secrets, and NetworkPolicies in the atom-agents namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: atom-runtime
  namespace: atom-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: atom-runtime-agent-manager
  namespace: atom-agents
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "patch", "replace", "delete"]
  - apiGroups: [""]
    resources: ["services", "secrets", "pods"]
    verbs: ["get", "list", "create", "update", "patch", "replace", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: atom-runtime-agent-manager
  namespace: atom-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: atom-runtime-agent-manager
subjects:
  - kind: ServiceAccount
    name: atom-runtime
    namespace: atom-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atom-runtime
  namespace: atom-system
  labels:
    app: atom-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atom-runtime
  template:
    metadata:
      labels:
        app: atom-runtime
    spec:
      serviceAccountName: atom-runtime
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: atom-runtime
          image: atom-runtime:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              name: http
          envFrom:
            - secretRef:
                name: atom-credentials
          env:
            - name: DATABASE_URL
              value: postgresql://atom:changeme@postgres-postgresql.atom-infra.svc.cluster.local:5432/atom?sslmode=disable
            - name: ATOM_STUDIO_API_URL
              value: http://atom-studio-api.atom-system.svc.cluster.local:3001
            - name: ATOM_RUNTIME_SELF_URL
              value: http://atom-runtime.atom-system.svc.cluster.local:8090
            - name: ATOM_GATE_CLUSTER_URL
              value: http://gate.atom-system.svc.cluster.local:8080
            - name: RUNTIME_BACKEND
              value: k8s
            - name: AGENT_NAMESPACE
              value: atom-agents
            - name: GATE_NAMESPACE
              value: atom-system
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy.atom-system.svc.cluster.local:4318
            - name: OTEL_SERVICE_NAME
              value: atom-runtime
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: atom-runtime
  namespace: atom-system
  labels:
    app: atom-runtime
spec:
  selector:
    app: atom-runtime
  ports:
    - port: 8090
      targetPort: 8090
      name: http
