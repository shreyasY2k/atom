# Grafana Alloy DaemonSet — pod log collection for atom-agents namespace
# Tails /var/log/containers/, filters for atom-agents pods,
# and produces log lines to the atom.agent.logs Kafka topic.
# Each message includes agent_id extracted from the pod label atom.io/agent-id.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy-log-collector
  namespace: atom-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy-log-collector
rules:
  - apiGroups: [""]
    resources: [pods, namespaces, nodes]
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources: [replicasets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy-log-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy-log-collector
subjects:
  - kind: ServiceAccount
    name: alloy-log-collector
    namespace: atom-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: atom-system
data:
  config.alloy: |
    // ── Alloy River config: atom-agents pod log collection ───────────────────
    // Reads container logs from /var/log/containers/ for atom-agents namespace,
    // enriches with pod labels (including atom.io/agent-id → agent_id),
    // and exports each log line as a JSON message to the atom.agent.logs topic.

    otelcol.receiver.filelog "atom_agent_pods" {
      include            = ["/var/log/containers/*_atom-agents_*.log"]
      include_file_path  = true
      include_file_name  = false

      // Container runtime writes JSON log lines; parse the "log" field as the body.
      operators = [
        {
          type = "json_parser"
          timestamp {
            parse_from = "attributes.time"
            layout     = "%Y-%m-%dT%H:%M:%S.%fZ"
          }
        },
        {
          type  = "move"
          from  = "attributes.log"
          to    = "body"
        },
      ]

      output {
        logs = [otelcol.processor.k8sattributes.default.input]
      }
    }

    otelcol.processor.k8sattributes "default" {
      auth_type = "serviceAccount"

      extract {
        metadata = ["k8s.pod.name", "k8s.namespace.name", "k8s.pod.uid"]
        labels = [
          {
            from      = "pod"
            key       = "atom.io/agent-id"
            tag_name  = "agent_id"
          },
        ]
      }

      pod_association {
        sources {
          from = "resource_attribute"
          name = "log.file.path"
        }
      }

      output {
        logs = [otelcol.exporter.kafka.atom.input]
      }
    }

    otelcol.exporter.kafka "atom" {
      brokers  = [env("KAFKA_BROKERS")]
      topic    = "atom.agent.logs"
      encoding = "otlp_json"
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy-log-collector
  namespace: atom-system
  labels:
    app: alloy-log-collector
spec:
  selector:
    matchLabels:
      app: alloy-log-collector
  template:
    metadata:
      labels:
        app: alloy-log-collector
    spec:
      serviceAccountName: alloy-log-collector
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: alloy
          image: grafana/alloy:latest
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/tmp/alloy
          env:
            - name: KAFKA_BROKERS
              value: redpanda.atom-infra.svc.cluster.local:9092
          ports:
            - containerPort: 12345
              name: http-metrics
          volumeMounts:
            - name: alloy-config
              mountPath: /etc/alloy
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: alloy-config
          configMap:
            name: alloy-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
