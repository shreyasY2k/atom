# Grafana Alloy DaemonSet — pod log collection for atom-agents namespace
# Tails /var/log/containers/, filters for atom-agents pods,
# and produces log lines to the atom.agent.logs Kafka topic.
# Each message includes agent_id extracted from the pod label atom.io/agent-id.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy-log-collector
  namespace: atom-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy-log-collector
rules:
  - apiGroups: [""]
    resources: [pods, namespaces, nodes]
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources: [replicasets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy-log-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy-log-collector
subjects:
  - kind: ServiceAccount
    name: alloy-log-collector
    namespace: atom-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: atom-system
data:
  config.alloy: |
    // ── Alloy DaemonSet River config ──────────────────────────────────────────
    // Collects pod logs from atom-agents namespace via the Kubernetes API
    // and ships them to Loki for storage + querying in Grafana.
    // Also forwards atom.io/agent-id label so Grafana can filter by agent.

    // ── Discover atom-agents pods ─────────────────────────────────────────────
    discovery.kubernetes "atom_agent_pods" {
      role = "pod"
      namespaces {
        names = ["atom-agents"]
      }
    }

    // ── Relabel: keep only useful labels, add agent_id ────────────────────────
    discovery.relabel "atom_agent_pods" {
      targets = discovery.kubernetes.atom_agent_pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_label_atom_io_agent_id"]
        target_label  = "agent_id"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_atom_io_domain_id"]
        target_label  = "domain_id"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
    }

    // ── Collect logs from discovered pods ─────────────────────────────────────
    loki.source.kubernetes "atom_agents" {
      targets    = discovery.relabel.atom_agent_pods.output
      forward_to = [loki.write.default.receiver]
    }

    // ── Forward to Loki ───────────────────────────────────────────────────────
    loki.write "default" {
      endpoint {
        url = "http://loki.atom-system.svc.cluster.local:3100/loki/api/v1/push"
      }
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy-log-collector
  namespace: atom-system
  labels:
    app: alloy-log-collector
spec:
  selector:
    matchLabels:
      app: alloy-log-collector
  template:
    metadata:
      labels:
        app: alloy-log-collector
    spec:
      serviceAccountName: alloy-log-collector
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: alloy
          image: grafana/alloy:latest
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/tmp/alloy
          env:
            - name: KAFKA_BROKERS
              value: redpanda.atom-infra.svc.cluster.local:9092
          ports:
            - containerPort: 12345
              name: http-metrics
          volumeMounts:
            - name: alloy-config
              mountPath: /etc/alloy
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: alloy-config
          configMap:
            name: alloy-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
