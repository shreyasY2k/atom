---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gate
  namespace: atom-system
  labels:
    app: gate
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gate
  template:
    metadata:
      labels:
        app: gate
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: gate
          image: atom-gate:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: atom-credentials
            - configMapRef:
                name: atom-cluster-config
          env:
            # Override Kubernetes auto-injected GATE_PORT (which is tcp://svc:port format)
            - name: GATE_PORT
              value: "8080"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atom-credentials
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)?sslmode=$(POSTGRES_SSL)"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atom-credentials
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)"
          volumeMounts:
            - name: jwt-keys
              mountPath: /etc/atom
              readOnly: true
            - name: policies
              mountPath: /policies
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: jwt-keys
          secret:
            secretName: atom-jwt-keys
        - name: policies
          configMap:
            name: opa-policies

---
apiVersion: v1
kind: Service
metadata:
  name: gate
  namespace: atom-system
  labels:
    app: gate
spec:
  selector:
    app: gate
  ports:
    - port: 8080
      targetPort: 8080
      name: http
