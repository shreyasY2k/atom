---
# Runs golang-migrate up against k8s postgres.
# ConfigMap atom-migrations is created by `make k8s-deploy` from the migrations/ directory.
# To re-run: kubectl delete job atom-migrate -n atom-system && kubectl apply -f this file
apiVersion: batch/v1
kind: Job
metadata:
  name: atom-migrate
  namespace: atom-system
  labels:
    app: atom-migrate
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-postgres
          image: pgvector/pgvector:pg16
          command: ["/bin/sh", "-c"]
          args:
            - |
              until pg_isready -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER -d $POSTGRES_DB &&
                psql -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER -d $POSTGRES_DB \
                  -tc "SELECT 1 FROM pg_extension WHERE extname='vector'" | grep -q 1; do
                echo "Waiting for postgres extensions..."
                sleep 3
              done
              echo "Postgres ready."
          envFrom:
            - configMapRef:
                name: atom-cluster-config
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: atom-credentials
                  key: POSTGRES_PASSWORD
      containers:
        - name: migrate
          image: migrate/migrate:v4.18.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              n=0
              until [ $n -ge 10 ]; do
                /migrate -path=/migrations \
                  -database "postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB?sslmode=$POSTGRES_SSL" \
                  up && exit 0
                n=$((n+1))
                echo "Migration attempt $n failed, retrying in 3s..."
                sleep 3
              done
              echo "Migrations failed after 10 attempts"
              exit 1
          envFrom:
            - configMapRef:
                name: atom-cluster-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atom-credentials
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: atom-migrations
