---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atom-studio-api
  namespace: atom-system
  labels:
    app: atom-studio-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atom-studio-api
  template:
    metadata:
      labels:
        app: atom-studio-api
    spec:
      containers:
        - name: atom-studio-api
          image: atom-studio-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - secretRef:
                name: atom-credentials
            - configMapRef:
                name: atom-cluster-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atom-credentials
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)?sslmode=$(POSTGRES_SSL)"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atom-credentials
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)"
          volumeMounts:
            - name: jwt-keys
              mountPath: /etc/atom
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: jwt-keys
          secret:
            secretName: atom-jwt-keys
---
apiVersion: v1
kind: Service
metadata:
  name: atom-studio-api
  namespace: atom-system
  labels:
    app: atom-studio-api
spec:
  selector:
    app: atom-studio-api
  ports:
    - port: 3001
      targetPort: 3001
      name: http
