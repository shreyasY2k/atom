---
# atom-studio-deployment.yaml
# FastAPI backend (atom-studio-api) with OTEL instrumentation added in SESSION-13.
# Frontend is served via nginx in the atom-studio-ui container.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: atom-studio-api
  namespace: atom-system
  labels:
    app: atom-studio-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atom-studio-api
  template:
    metadata:
      labels:
        app: atom-studio-api
    spec:
      containers:
        - name: atom-studio-api
          image: atom-studio-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - secretRef:
                name: atom-credentials
          env:
            - name: DATABASE_URL
              value: postgresql://atom:changeme@postgres.atom-infra.svc.cluster.local:5432/atom?sslmode=disable
            - name: REDIS_URL
              value: redis://:changeme@redis-master.atom-infra.svc.cluster.local:6379
            - name: ATOM_LLM_URL
              value: http://atom-llm.atom-system.svc.cluster.local:4000
            - name: ATOM_RUNTIME_URL
              value: http://atom-runtime.atom-system.svc.cluster.local:8090
            - name: JWT_PRIVATE_KEY_PATH
              value: /etc/atom/jwt_private.pem
            - name: JWT_PUBLIC_KEY_PATH
              value: /etc/atom/jwt_public.pem
            - name: KAFKA_BROKERS
              value: redpanda.atom-infra.svc.cluster.local:9092
            - name: PLATFORM_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: atom-credentials
                  key: platform_hmac_secret
                  optional: true
            # Python OTEL exporter expects a full URL
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy.atom-system.svc.cluster.local:4318
            - name: OTEL_SERVICE_NAME
              value: atom-studio
          volumeMounts:
            - name: jwt-keys
              mountPath: /etc/atom
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: jwt-keys
          secret:
            secretName: atom-jwt-keys

---
apiVersion: v1
kind: Service
metadata:
  name: atom-studio-api
  namespace: atom-system
  labels:
    app: atom-studio-api
spec:
  selector:
    app: atom-studio-api
  ports:
    - port: 3001
      targetPort: 3001
      name: http
