---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atom-llm
  namespace: atom-system
  labels:
    app: atom-llm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atom-llm
  template:
    metadata:
      labels:
        app: atom-llm
    spec:
      containers:
        - name: atom-llm
          image: atom-llm:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - secretRef:
                name: atom-credentials
            - configMapRef:
                name: atom-cluster-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atom-credentials
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: STORE_MODEL_IN_DB
              value: "False"
            - name: DISABLE_SPEND_LOGS
              value: "True"
            - name: LITELLM_WORKER_STARTUP_HOOKS
              value: atom_extensions.startup_hook:register_callbacks
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: atom-llm
  namespace: atom-system
  labels:
    app: atom-llm
spec:
  selector:
    app: atom-llm
  ports:
    - port: 4000
      targetPort: 4000
      name: http
