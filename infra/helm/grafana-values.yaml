# infra/helm/grafana-values.yaml — Grafana (SESSION-13 / SESSION-15)
#
# Credentials (same in docker-compose and k8s):
#   admin / atom-grafana-dev
#
# k8s access:  http://grafana.atom.local
# docker-compose access: http://localhost:3005

adminUser: admin
adminPassword: "atom-grafana-dev"

grafana.ini:
  server:
    root_url: "%(protocol)s://%(domain)s:%(http_port)s/"
  auth.anonymous:
    enabled: false
  feature_toggles:
    enable: traceqlEditor

# ── Datasources ───────────────────────────────────────────────────────────────
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      # ── Loki — log aggregation ───────────────────────────────────────────────
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.atom-system.svc.cluster.local:3100
        isDefault: false
        editable: true
        jsonData:
          maxLines: 5000
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: '"trace_id":"(\w+)"'
              name: TraceID
              url: "$${__value.raw}"

      # ── Tempo — distributed tracing ──────────────────────────────────────────
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        # Tempo HTTP query API is on port 3200 (not 3100 which is Loki)
        url: http://tempo.atom-system.svc.cluster.local:3200
        isDefault: false
        editable: true
        jsonData:
          httpMethod: GET
          nodeGraph:
            enabled: false
          traceToLogs:
            datasourceUid: loki
            tags: [service, container]
            filterByTraceID: true
            filterBySpanID: false
          lokiSearch:
            datasourceUid: loki

      # ── Alloy — metrics (self-observability for the collector) ────────────────
      - name: Alloy
        type: prometheus
        uid: alloy
        access: proxy
        url: http://alloy.atom-system.svc.cluster.local:12345
        isDefault: false
        editable: true

# ── Dashboard provisioning ────────────────────────────────────────────────────
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    folder: /var/lib/grafana/dashboards/atom
    searchNamespace: atom-system
    watchMethod: WATCH

  datasources:
    enabled: false

service:
  type: ClusterIP
  port: 3000

persistence:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: false
