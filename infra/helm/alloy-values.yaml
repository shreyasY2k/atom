# infra/helm/alloy-values.yaml — Grafana Alloy
# Receives OTLP traces from all ATOM services and forwards to Tempo.
# Also exposes ports 4317 (gRPC) and 4318 (HTTP) for OTLP ingestion.

alloy:
  configMap:
    content: |-
      // ── OTLP receivers ────────────────────────────────────────────────────────
      otelcol.receiver.otlp "default" {
        grpc { endpoint = "0.0.0.0:4317" }
        http { endpoint = "0.0.0.0:4318" }
        output {
          traces = [otelcol.processor.batch.default.input]
        }
      }

      // ── Batch processor ───────────────────────────────────────────────────────
      otelcol.processor.batch "default" {
        timeout         = "5s"
        send_batch_size = 1024
        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      // ── Tempo exporter ────────────────────────────────────────────────────────
      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.atom-system.svc.cluster.local:4317"
          tls { insecure = true }
        }
      }

  # Expose OTLP ports on the Service (must be under alloy: not top-level)
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

controller:
  type: deployment
  replicas: 1

service:
  enabled: true
  type: ClusterIP

serviceMonitor:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
