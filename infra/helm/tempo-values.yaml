# infra/helm/tempo-values.yaml — Grafana Tempo (single-binary)
#
# Enables metrics-generator with local-blocks so TraceQL metrics queries
# (| rate(), | quantile_over_time()) work without Prometheus.
#
# Tempo HTTP server: port 3200
# OTLP gRPC: 4317  |  OTLP HTTP: 4318

tempo:
  # ── Storage ──────────────────────────────────────────────────────────────────
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  # ── OTLP receivers ───────────────────────────────────────────────────────────
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  # ── Metrics generator — local-blocks ────────────────────────────────────────
  # Serves TraceQL | rate() / | quantile_over_time() from Tempo directly.
  # No Prometheus needed for dev; set remote_write if you want RED metrics there.
  metricsGenerator:
    enabled: true
    processor:
      local_blocks:
        max_live_traces: 50000
        flush_to_storage: true
    storage:
      path: /var/tempo/generator/wal
      remote_write: []

  # Activate local-blocks processor for all tenants
  overrides:
    defaults:
      metrics_generator:
        processors:
          - local-blocks

  # ── Compaction / retention ────────────────────────────────────────────────────
  compactor:
    compaction:
      block_retention: 336h   # 14 days

  # ── Server ───────────────────────────────────────────────────────────────────
  server:
    http_listen_port: 3200

# ── Persistence ──────────────────────────────────────────────────────────────
persistence:
  enabled: true
  size: 5Gi
  storageClassName: standard

serviceAccount:
  create: true

service:
  type: ClusterIP

# ── Health probes — port 3200 (Tempo HTTP) NOT 3100 (that is Loki) ────────────
livenessProbe:
  httpGet:
    path: /ready
    port: 3200
  initialDelaySeconds: 30
  timeoutSeconds: 5
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 3200
  initialDelaySeconds: 20
  timeoutSeconds: 5
  periodSeconds: 10
  failureThreshold: 3

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
