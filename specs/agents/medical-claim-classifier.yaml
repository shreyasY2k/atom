apiVersion: atom.platform/v1
kind: AgentDeployment
metadata:
  name: medical-claim-classifier
  domain: insurance-claims
  version: 1.0.0
  description: Medical claim document classifier for PDF pages to categorize bills,
    lab reports, and summaries.
  owner: user:demo@atom.demo
spec:
  agents:
  - name: document-classifier
    role: standalone
    agent_role_file: agent-roles/insurance/medical-claim-classifier.role.md
    reasoning_mode: prescribed
    model: gemini-3.1-pro
    temperature: 1.0
    reasoning_effort: medium
    max_iterations: 6
    tools:
    - extract_document_text
    input_schema:
      type: object
      required: [page_text]
      properties:
        page_text:
          type: string
          description: "Extracted text from a medical claim document page"
        file_name:
          type: string
          description: "Original filename (optional, for context)"
    sample_prompts:
      - "Classify this medical bill: [paste document text]"
      - "What type of document is this claim?"
    memory:
      type: short_term
      cross_conversation:
        enabled: true
        kind: personal
        identity_field: input.customer_id
  flow:
    type: standalone
  audit:
    log_to: minio://audit-logs/agent/medical-claim-classifier
    retention_days: 90
  deployment:
    runtime: agentscope
    sandbox: base
    replicas: 1
