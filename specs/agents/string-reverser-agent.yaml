apiVersion: atom.platform/v1
kind: AgentDeployment
metadata:
  name: string-reverser-agent
  domain: banking-kyc
  version: 1.0.0
  description: An agent to reverse a given string and invert the case of each character.
  owner: user:demo@atom.demo
spec:
  agents:
  - name: string-reverser
    role: standalone
    agent_role_file: agent-roles/banking-kyc/string-reverser-agent.role.md
    reasoning_mode: prescribed
    model: gemini-3.1-pro
    temperature: 1.0
    reasoning_effort: medium
    max_iterations: 6
    tools:
    - get_customer_profile
    memory:
      type: short_term
      cross_conversation:
        enabled: true
        kind: personal
        identity_field: input.customer_id
    skill: skills/banking-kyc/string-reverser.skill.md
  flow:
    type: standalone
  audit:
    log_to: minio://audit-logs/agent/string-reverser-agent
    retention_days: 90
  deployment:
    runtime: agentscope
    sandbox: base
    replicas: 1
