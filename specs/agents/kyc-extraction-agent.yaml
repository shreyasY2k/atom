apiVersion: atom.platform/v1
kind: AgentDeployment
metadata:
  name: kyc-extraction-agent
  domain: banking-kyc
  version: 1.0.0
  description: Agent that extracts customer name information from KYC images and documents.
  owner: user:default@atom.io
spec:
  agents:
  - name: kyc-extractor
    role: standalone
    agent_role_file: agent-roles/banking-kyc/kyc-extractor.role.md
    reasoning_mode: prescribed
    model: gemini-3.1-pro
    temperature: 1.0
    reasoning_effort: medium
    max_iterations: 6
    tools:
    - get_kyc_documents
    memory:
      type: short_term
      cross_conversation:
        enabled: true
        kind: personal
        identity_field: input.customer_id
  flow:
    type: standalone
  audit:
    log_to: minio://audit-logs/agent/kyc-extraction-agent
    retention_days: 90
  deployment:
    runtime: agentscope
    sandbox: base
    replicas: 1
