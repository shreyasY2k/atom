# Reference workflow — Asset Transfer Service (ATS) for US bank securities ops
#
# Demonstrates every node type with its full attribute set (sessions 01–05).
# Three demo paths:
#   1. Routine ($40K)     — KYC PASS, no sanction hit, amount < $250K, agents run
#   2. High-value ($1.2M) — branches to compliance-review (amount > $250K)
#   3. KYC breach         — KYC confidence < 0.82 → kyc-human-review (skip_if bypasses for tiny amounts)

apiVersion: atom.platform/v1
kind: WorkflowDeployment

metadata:
  name: ats-asset-transfer
  domain: banking-securities-ops
  version: 1.1.0
  description: >
    Asset Transfer Service workflow for US bank securities operations.
    Receives an inbound transfer request, refreshes KYC, screens for
    sanctions, branches by amount tier, reconciles assets or routes for
    compliance review, submits SWIFT/DTC instruction, captures human
    final approval, notifies.
  owner: atom-platform-team

  layout:
    nodes:
      receive-request:   { x: 300, y: 0 }
      kyc-refresh:       { x: 100, y: 140 }
      kyc-human-review:  { x: 560, y: 140 }
      ofac-screen:       { x: 100, y: 280 }
      amount-decision:   { x: 100, y: 420 }
      compliance-review: { x: -100, y: 560 }
      asset-recon:       { x: 320, y: 560 }
      swift-submit:      { x: 100, y: 700 }
      final-accept:      { x: 100, y: 840 }
      notify:            { x: 100, y: 980 }

  sample_inputs:
    - label: "Routine $40K"
      input:
        transfer_id: "XFER-100442-001"
        customer_id: "CUST-100442"
        amount_usd: 40000
        securities:
          - cusip: "912828ZQ6"
            quantity: 40
        destination:
          custodian: "JPMorgan"
          account: "ACC-JPM-9934"
    - label: "High-value $1.2M"
      input:
        transfer_id: "XFER-200119-001"
        customer_id: "CUST-200119"
        amount_usd: 1200000
        securities:
          - cusip: "912810RW0"
            quantity: 1240
        destination:
          custodian: "Goldman"
          account: "ACC-GS-4421"
    - label: "Stale doc"
      input:
        transfer_id: "XFER-300577-001"
        customer_id: "CUST-300577"
        amount_usd: 49000
        securities:
          - cusip: "912828ZQ6"
            quantity: 50
        destination:
          custodian: "Citibank"
          account: "ACC-CITI-7711"

spec:
  input_schema:
    type: object
    required: [transfer_id, customer_id, amount_usd, securities, destination]
    properties:
      transfer_id:    { type: string }
      customer_id:    { type: string }
      amount_usd:     { type: number }
      securities:     { type: array }
      destination:    { type: object }

  # Default error handler — if any node errors and has no on_error set,
  # jump to notify with _last_error in context.
  error_handler: notify

  nodes:

    # ── Step 1: Register the incoming transfer ────────────────────────────────
    - id: receive-request
      label: "Receive transfer request"
      description: >
        Registers the inbound ACATS-style transfer request with the
        incoming-queue service. Returns a tracking receipt.
      type: http
      method: POST
      url_template: "http://incoming-queue:8099/transfers"
      body_template:
        transfer_id: "{{ ctx.input.transfer_id }}"
        customer_id: "{{ ctx.input.customer_id }}"
        amount_usd: "{{ ctx.input.amount_usd }}"
      # Extract the receipt_id from the response rather than storing the whole blob
      extract:
        receipt_id: receipt.id
        queued_at: receipt.queued_at
      output_capture: receive_result
      timeout_seconds: 15
      retry:
        max_attempts: 3
        backoff: exponential
        initial_delay_seconds: 1.0
        max_delay_seconds: 10.0
      tags: [ingestion, idempotent]
      next: kyc-refresh

    # ── Step 2: KYC refresh (agent) ───────────────────────────────────────────
    - id: kyc-refresh
      label: "KYC refresh"
      description: >
        Pulls the customer's current KYC profile, checks document staleness,
        runs adverse-media + PEP screening, returns a confidence score and
        recommendation. Routes to kyc-human-review if confidence < 0.82.
      type: agent
      agent_ref:
        name: kyc-refresh
        version: latest
      input_mapping:
        customer_id: "ctx.input.customer_id"
      output_capture: kyc_result
      confidence_threshold: 0.82
      fallback_node: kyc-human-review
      timeout_seconds: 120
      retry:
        max_attempts: 2
        backoff: constant
        initial_delay_seconds: 5.0
      # If agent is unreachable entirely, route to human review
      on_error: kyc-human-review
      tags: [kyc, compliance]
      next: ofac-screen

    # ── Step 3: Human KYC review (low-confidence) ────────────────────────────
    - id: kyc-human-review
      label: "KYC human review (low-confidence)"
      description: >
        Created when the KYC agent returns confidence < 0.82 or errors.
        Reviewer sees agent draft and can accept, reject, or edit.
      type: human_task
      assignee_group: ops
      task_template:
        title: "KYC needs human review for {{ ctx.input.customer_id }}"
        description: >
          The KYC agent returned confidence {{ ctx.kyc_result.confidence }}.
          Threshold is 0.82. Please review the agent draft and
          accept, reject, or edit before the transfer proceeds.
        actions: [accept, reject, edit]
      sla_seconds: 7200
      priority: high
      # Show only the agent draft and transfer_id to the reviewer — not the whole context
      evidence: [kyc_result, receive_result]
      # Auto-skip for very small amounts (under $1,000) — trivial, no need for human
      skip_if:
        condition: ctx.input.amount_usd < 1000
        auto_resolution: accept
      escalation_policy:
        action: escalate
        escalate_to_group: compliance
      output_capture: kyc_human_decision
      tags: [kyc, human-in-the-loop]
      next: ofac-screen

    # ── Step 4: OFAC sanctions screening ─────────────────────────────────────
    - id: ofac-screen
      label: "OFAC sanctions screening"
      description: >
        Screens the customer and destination institution against the OFAC
        SDN list and other sanctions databases. Fail-soft: a network error
        is recorded and the workflow continues (with a flag in ctx).
      type: http
      method: POST
      url_template: "http://ofac-svc:8096/screen"
      body_template:
        customer_id: "{{ ctx.input.customer_id }}"
        destination: "{{ ctx.input.destination }}"
      # Pull the specific hit flag and screening ID from the response
      extract:
        sanctions_hit: hit
        screening_id: screening_id
      output_capture: ofac_result
      timeout_seconds: 10
      retry:
        max_attempts: 2
        backoff: constant
        initial_delay_seconds: 2.0
      on_error: notify
      tags: [compliance, sanctions]
      next: amount-decision

    # ── Step 5: Amount-tier routing ───────────────────────────────────────────
    - id: amount-decision
      label: "Route by amount tier"
      description: >
        Three-way decision: ultra-high-value (>$1M) → compliance-review,
        high-value ($250K–$1M) → compliance-review, routine (<$250K) →
        asset-recon. Both high-value tiers land in compliance-review;
        the label distinguishes them in the audit trail.
      type: decision
      # Multi-way cases evaluated in order; first match wins
      cases:
        - condition: ctx.input.amount_usd > 1000000
          target: compliance-review
          label: "Ultra high-value (>$1M)"
        - condition: ctx.input.amount_usd > 250000
          target: compliance-review
          label: "High-value ($250K–$1M)"
      default: asset-recon
      tags: [routing, risk-tiering]

    # ── Step 6a: Asset reconciliation (routine path) ─────────────────────────
    - id: asset-recon
      label: "Asset reconciliation (routine)"
      description: >
        Compares incoming CUSIPs/quantities against customer records and
        the security master. Returns a confidence score; low confidence
        routes to compliance-review for manual check.
      type: agent
      agent_ref:
        name: asset-recon
        version: latest
      input_mapping:
        transfer_id: "ctx.input.transfer_id"
        securities: "ctx.input.securities"
      output_capture: recon_result
      confidence_threshold: 0.80
      fallback_node: compliance-review
      timeout_seconds: 120
      retry:
        max_attempts: 2
        backoff: exponential
      on_error: compliance-review
      tags: [reconciliation, securities]
      next: swift-submit

    # ── Step 6b: Compliance review (high-value or fallback) ──────────────────
    - id: compliance-review
      label: "Compliance review (high-value / fallback)"
      description: >
        Triggered for all high-value transfers and as fallback when
        asset-recon confidence < 0.80. Compliance officer sees KYC result,
        OFAC screening, and recon output before approving.
      type: human_task
      assignee_group: compliance
      task_template:
        title: "Compliance review needed: transfer {{ ctx.input.transfer_id }}"
        description: >
          Transfer of ${{ ctx.input.amount_usd }} requires compliance review.
          KYC result: {{ ctx.kyc_result.recommendation }}.
          OFAC screening: {{ ctx.ofac_result.sanctions_hit }}.
          Recon: {{ ctx.recon_result.recommendation }}.
        actions: [accept, reject, edit]
      sla_seconds: 14400
      priority: high
      # Surface only the relevant results — not the full context
      evidence: [kyc_result, ofac_result, recon_result]
      escalation_policy:
        action: escalate
        escalate_to_group: risk-management
      output_capture: compliance_decision
      tags: [compliance, human-in-the-loop]
      next: swift-submit

    # ── Step 7: Submit SWIFT/DTC instruction ──────────────────────────────────
    - id: swift-submit
      label: "Submit SWIFT/DTC instruction"
      description: >
        Sends the MT103 / DTC ACATS instruction to the settlement gateway.
        Retried up to 3× with exponential backoff on transient errors.
      type: http
      method: POST
      url_template: "http://swift-gw:8097/instructions"
      body_template:
        transfer_id: "{{ ctx.input.transfer_id }}"
        amount_usd: "{{ ctx.input.amount_usd }}"
        securities: "{{ ctx.input.securities }}"
        destination: "{{ ctx.input.destination }}"
        compliance_ref: "{{ ctx.compliance_decision.task_id }}"
      # Extract the instruction reference number from the response
      extract:
        instruction_id: instruction_id
        settlement_date: submitted_at
        swift_status: status
      expect_status: [200, 201, 202]
      output_capture: swift_result
      timeout_seconds: 30
      retry:
        max_attempts: 3
        backoff: exponential
        initial_delay_seconds: 2.0
        max_delay_seconds: 30.0
      on_error: notify
      tags: [settlement, swift, state-changing]
      next: final-accept

    # ── Step 8: Final human accept / override ─────────────────────────────────
    - id: final-accept
      label: "Final accept / override"
      description: >
        Operations officer reviews the full execution trail and either
        confirms the SWIFT instruction was submitted correctly, overrides
        it, or rejects. Auto-approves for micro-transfers under $500.
      type: human_task
      assignee_group: ops
      task_template:
        title: "Final approval: transfer {{ ctx.input.transfer_id }}"
        description: >
          Workflow has executed end-to-end.
          SWIFT instruction ID: {{ ctx.swift_result.instruction_id }}.
          Settlement expected: {{ ctx.swift_result.settlement_date }}.
          Review audit trail and accept, reject, or edit.
        actions: [accept, reject, edit]
      sla_seconds: 1800
      priority: high
      evidence: [swift_result, kyc_result, ofac_result, compliance_decision]
      # Tiny amounts can be auto-approved after SWIFT submission
      skip_if:
        condition: ctx.input.amount_usd < 500
        auto_resolution: accept
      escalation_policy:
        action: auto_approve
      output_capture: final_decision
      tags: [final-gate, human-in-the-loop]
      next: notify

    # ── Step 9: Audit and notify ──────────────────────────────────────────────
    - id: notify
      label: "Audit + notify"
      description: >
        Marks the transfer complete in the incoming-queue system and
        posts the final outcome. Also reached as the global error_handler
        node — in that case, _last_error is in ctx.
      type: http
      method: POST
      url_template: "http://incoming-queue:8099/transfers/{{ ctx.input.transfer_id }}/complete"
      body_template:
        final_decision: "{{ ctx.final_decision }}"
        swift_result: "{{ ctx.swift_result }}"
        error: "{{ ctx._last_error }}"
      output_capture: notify_result
      timeout_seconds: 10
      retry:
        max_attempts: 2
        backoff: constant
      tags: [notification, terminal]
      next: null   # terminal

  audit:
    log_to: minio://audit-logs/workflow/ats-asset-transfer
    retention_days: 90

  deployment:
    runtime: temporal
    task_queue: ats-task-queue
