version: 2

project_name: atom

before:
  hooks:
    - go work sync
    - bash -c 'cd atom-cli && go mod tidy'

builds:
  - id: atom-cli
    dir: atom-cli
    main: ./cmd/atom
    binary: atom
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: atom-cli
    ids: [atom-cli]
    name_template: "atom_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "atom_{{ .Version }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
