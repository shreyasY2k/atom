version: 2

project_name: atom

builds:
  - id: atom-cli
    # No dir: — use full path from repo root so GoReleaser v2 does not
    # auto-generate "cd atom-cli && go mod tidy" (which fails because
    # `cd` is not a standalone executable on Linux).
    main: ./atom-cli/cmd/atom
    binary: atom
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: atom-cli
    ids: [atom-cli]
    name_template: "atom_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "atom_{{ .Version }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
