version: 2

project_name: atom

# GitLab release target — used when GITLAB_TOKEN is set (GitLab CI).
# When running on GitHub Actions, GoReleaser falls back to the GitHub API automatically.
gitlab_urls:
  api: https://gitlab.com/api/v4/
  download: https://gitlab.com
  # Use CI_JOB_TOKEN instead of a manually managed GITLAB_TOKEN PAT.
  # This mirrors how docker login uses CI_REGISTRY_PASSWORD (also job-token backed).
  use_job_token: true

builds:
  - id: atom-cli
    # No dir: — use full path from repo root so GoReleaser v2 does not
    # auto-generate "cd atom-cli && go mod tidy" (which fails because
    # `cd` is not a standalone executable on Linux).
    main: ./atom-cli/cmd/atom
    binary: atom
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: atom-cli
    ids: [atom-cli]
    # No version in filename so /releases/latest/download/atom_<os>_<arch>.tar.gz works
    name_template: "atom_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "atom_{{ .Version }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
