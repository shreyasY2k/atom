# AgentArmor runtime config — mounted into the container at /app/config.yaml.
# Edit this file and run `docker compose restart agentarmor` to apply.
# Field names must match ArmorConfig / layer config classes in agentarmor-core.

version: "1.0"
agent_type: "general"
risk_level: "medium"

# L1 — Ingestion: prompt injection detection
ingestion:
  enabled: true
  scan_for_injection: true
  injection_detection_model: heuristic

# L2 — Storage: not relevant in gateway mode
storage:
  enabled: false

# L3 — Context: goal-lock / template injection stripping
context:
  enabled: true

# L4 — Planning: action risk scoring
planning:
  enabled: true
  require_plan_validation: true

# L5 — Execution: per-agent rate limiting
execution:
  enabled: true
  sandbox_enabled: false
  network_egress_allowed: true   # agents make HTTP calls to mock services

# L6 — Output: PII, credential, sensitivity scanning
output:
  enabled: true
  pii_redaction: true
  sensitivity_filtering: true

# L7 — Inter-agent: not used (single-gateway topology)
interagent:
  enabled: false

# L8 — Identity: disabled — identity is managed by LiteLLM virtual keys
identity:
  enabled: false
