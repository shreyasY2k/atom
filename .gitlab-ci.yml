# ── Mock services (matrix) ────────────────────────────────────────────────────
# All mocks share the same Dockerfile pattern: context = mocks/<name>/
# Add or remove names from the list as mock services change.

build-mocks:
  <<: *kaniko
  stage: build-static
  rules:
    - if: '$CI_PIPELINE_SOURCE != "trigger"'
      changes: ["mocks/**/*"]
  parallel:
    matrix:
      - MOCK_NAME:
          - fnol_svc
          - fraud_svc
          - incoming_queue
          - kyc_svc
          - lcr_engine
          - market_data
          - ocr_svc
          - ofac_svc
          - securities_ops
          - swift_gw
          - task_queue
          - treasury_dw
  script:
    - /kaniko/executor
      --context="${CI_PROJECT_DIR}/mocks/${MOCK_NAME}"
      --dockerfile="${CI_PROJECT_DIR}/mocks/${MOCK_NAME}/Dockerfile"
      --destination="${CI_REGISTRY_IMAGE}/mock-${MOCK_NAME}:${CI_COMMIT_SHORT_SHA}"
      --destination="${CI_REGISTRY_IMAGE}/mock-${MOCK_NAME}:latest"

# ── Agent containers (on-demand, triggered by builder-backend) ────────────────
#
# The builder-backend calls the GitLab trigger API after committing the agent
# build context (agent.py + Dockerfile + requirements) to:
#   agent-builds/<AGENT_NAME>-<AGENT_VERSION>/
#
# The Dockerfile in that path uses ARG RUNTIME_IMAGE so the base image is
# injected at build time without hardcoding a registry URL.
#
# Kaniko uses the full project dir as context so the Dockerfile can COPY shared
# files (tools/, memory/, agent-roles/, packages/) from the repo root.

build-agent:
  <<: *kaniko
  stage: build-agent
  rules:
    - if: >
        $CI_PIPELINE_SOURCE == "trigger" &&
        $BUILD_TYPE == "agent" &&
        $AGENT_NAME != null &&
        $AGENT_VERSION != null
  script:
    - RUNTIME_IMAGE="${CI_REGISTRY_IMAGE}/agentscope-runtime-sandbox:latest"
    - CONTEXT_DOCKERFILE="${CI_PROJECT_DIR}/agent-builds/${AGENT_NAME}-${AGENT_VERSION}/Dockerfile"
    - /kaniko/executor
      --context="${CI_PROJECT_DIR}"
      --dockerfile="${CONTEXT_DOCKERFILE}"
      --build-arg "RUNTIME_IMAGE=${RUNTIME_IMAGE}"
      --destination="${CI_REGISTRY_IMAGE}/agents/${AGENT_NAME}:${AGENT_VERSION}"
      --destination="${CI_REGISTRY_IMAGE}/agents/${AGENT_NAME}:latest"
      --cache=true
      --cache-repo="${CI_REGISTRY_IMAGE}/cache"
