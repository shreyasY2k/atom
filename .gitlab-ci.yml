# Atom Agent Platform — GitLab CI/CD
#
# Two build categories:
#   STATIC  — source-built images rebuilt when their files change (git push)
#   AGENT   — per-agent images built on demand via pipeline trigger API
#
# No registry URLs, hostnames, or project IDs are hardcoded.
# All coordinates come from GitLab-provided variables (CI_REGISTRY,
# CI_REGISTRY_IMAGE, CI_REGISTRY_USER, CI_REGISTRY_PASSWORD) or from
# project-level CI/CD variables you configure in Settings → CI/CD → Variables:
#
#   GITLAB_TRIGGER_TOKEN   pipeline trigger token (for builder-backend to fire agent builds)
#
# Usage — trigger an agent build from builder-backend:
#   POST /api/v4/projects/:id/trigger/pipeline
#   token=<GITLAB_TRIGGER_TOKEN>  ref=<branch>
#   variables[BUILD_TYPE]=agent
#   variables[AGENT_NAME]=<name>
#   variables[AGENT_VERSION]=<version>

stages:
  - build-static
  - build-agent

# ── Shared Kaniko setup ────────────────────────────────────────────────────────
# Kaniko builds images inside CI without a Docker daemon (no privileged mode).
# Auth is written to /kaniko/.docker/config.json before each job.

.kaniko:
  &kaniko
  image:
    name: gcr.io/kaniko-project/executor:v1.23.0-debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - AUTH=$(printf '%s:%s' "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"${AUTH}\"}}}" > /kaniko/.docker/config.json

# ── Static containers ──────────────────────────────────────────────────────────
# Each job runs only when its source files change, and only on non-triggered
# pipelines (i.e. normal git pushes / MR pipelines).

build-gate:
  <<: *kaniko
  stage: build-static
  rules:
    - if: '$CI_PIPELINE_SOURCE != "trigger"'
      changes: ["gate/**/*"]
  script:
    - /kaniko/executor
      --context="${CI_PROJECT_DIR}/gate"
      --dockerfile="${CI_PROJECT_DIR}/gate/Dockerfile"
      --destination="${CI_REGISTRY_IMAGE}/gate:${CI_COMMIT_SHORT_SHA}"
      --destination="${CI_REGISTRY_IMAGE}/gate:latest"

build-builder-backend:
  <<: *kaniko
  stage: build-static
  rules:
    - if: '$CI_PIPELINE_SOURCE != "trigger"'
      changes:
        - builder-backend/**/*
        - packages/**/*
  script:
    - /kaniko/executor
      --context="${CI_PROJECT_DIR}"
      --dockerfile="${CI_PROJECT_DIR}/builder-backend/Dockerfile"
      --destination="${CI_REGISTRY_IMAGE}/builder-backend:${CI_COMMIT_SHORT_SHA}"
      --destination="${CI_REGISTRY_IMAGE}/builder-backend:latest"

