# atom-llm dev config — local testing only
# Production config is generated by atom-studio at deployment time.

model_list:
  - model_name: gemini-2.0-flash        # name agents use in model_name
    litellm_params:
      model: gemini/gemini-2.0-flash     # LiteLLM provider/model format
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-1.5-flash
    litellm_params:
      model: gemini/gemini-1.5-flash
      api_key: os.environ/GEMINI_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # No database_url — running without DB for local dev.
  # Spend tracking and virtual keys are disabled in this mode.
