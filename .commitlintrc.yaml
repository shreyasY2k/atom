extends:
  - '@commitlint/config-conventional'

rules:
  type-enum:
    - 2
    - always
    - [feat, fix, chore, docs, test, refactor, perf, ci, build, revert]
  scope-enum:
    - 1
    - always
    - [gate, atom-llm, atom-sdk, atom-runtime, atom-memory, atom-studio,
       atom-cli, policies, infra, migrations, docs, sessions, deps, all]
  subject-max-length:
    - 2
    - always
    - 100
