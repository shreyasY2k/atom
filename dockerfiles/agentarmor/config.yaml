# AgentArmor default config — baked into image.
# The compose mount (./agentarmor/config.yaml) overrides this at runtime.

layers:
  ingestion:
    enabled: true
    scan_prompt_injection: true
    verify_sources: false

  storage:
    enabled: false   # no persistent store in gateway mode

  context:
    enabled: true
    goallock: true
    canary_tokens: false

  planning:
    enabled: true
    risk_score_threshold: 7

  execution:
    enabled: true
    rate_limit_per_minute: 300
    circuit_breaker: false

  output:
    enabled: true
    scan_credentials: true
    scan_pii: true
    scan_harmful: true
    scan_exfiltration: true
    schema_validation: false

  inter_agent:
    enabled: false   # single-gateway topology

  identity:
    enabled: false   # identity managed by LiteLLM virtual keys

server:
  host: "0.0.0.0"
  port: 8400
  log_level: "INFO"
