# AgentArmor default config — baked into image.
# The compose mount (./agentarmor/config.yaml) overrides this at runtime.

version: "1.0"
agent_type: "general"
risk_level: "medium"

ingestion:
  enabled: true
  scan_for_injection: true
  injection_detection_model: heuristic

storage:
  enabled: false

context:
  enabled: true

planning:
  enabled: true
  require_plan_validation: true

execution:
  enabled: true
  sandbox_enabled: false
  network_egress_allowed: true

output:
  enabled: true
  pii_redaction: true
  sensitivity_filtering: true

interagent:
  enabled: false

identity:
  enabled: false
