name: atom-dev

services:

  # ── Postgres 16 with pgvector ───────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: atom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: atom
      POSTGRES_USER: atom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atom -d atom && psql -U atom -d atom -tc \"SELECT 1 FROM pg_extension WHERE extname='vector'\" | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: atom-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── DB migrations (auto-run on every dev-up; idempotent) ─────────────────────
  migrate:
    image: migrate/migrate:v4.18.1
    container_name: atom-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    entrypoint: ["/bin/sh"]
    command:
      - "-c"
      - |
        n=0
        until [ $$n -ge 10 ]; do
          /usr/local/bin/migrate -path=/migrations \
            -database "postgresql://atom:${POSTGRES_PASSWORD:-changeme}@postgres:5432/atom?sslmode=disable" \
            up && exit 0
          n=$$(($$n+1))
          echo "Migration attempt $$n failed, retrying in 3s..."
          sleep 3
        done
        echo "Migrations failed after 10 attempts"
        exit 1

  # ── Dev seed (idempotent ON CONFLICT; safe to re-run on every start) ─────────
  seed:
    image: pgvector/pgvector:pg16
    container_name: atom-seed
    restart: "no"
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./migrations/seed_dev.sql:/seed_dev.sql:ro
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-changeme}
    entrypoint: ["psql", "-h", "postgres", "-U", "atom", "-d", "atom", "-f", "/seed_dev.sql"]

  # ── MinIO (S3-compatible object store) ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: atom-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket init ───────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: atom-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-changeme};
        mc mb --ignore-existing local/atom-audit;
        mc mb --ignore-existing local/atom-policies;
        echo 'MinIO buckets ready';
      "

  # ── Redpanda (Kafka-compatible) ─────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: atom-redpanda
    restart: unless-stopped
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --overprovisioned
      - --kafka-addr INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr INTERNAL://redpanda:9092,EXTERNAL://localhost:19092
    ports:
      - "9092:9092"   # INTERNAL — for inter-container traffic (used by KAFKA_BROKERS=redpanda:9092)
      - "19092:19092" # EXTERNAL — for host-side tools (rpk, kafkacat, etc.)
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Kafka topic init ────────────────────────────────────────────────────────
  redpanda-init:
    image: redpandadata/redpanda:latest
    container_name: atom-redpanda-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        rpk topic create atom.audit atom.llm atom.agent.logs atom.deployments \
          --brokers redpanda:9092 2>/dev/null || true;
        echo 'Kafka topics ready';
      "

  # ── OPA (policy engine) ─────────────────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:latest-rootless
    container_name: atom-opa
    restart: unless-stopped
    command:
      - run
      - --server
      - --watch
      - --log-format=json
      - --ignore=..*
      - /policies/base
      - /policies/custom
    ports:
      - "8181:8181"
    volumes:
      - ./policies:/policies:ro

  # ── GATE ────────────────────────────────────────────────────────────────────
  gate:
    build:
      context: gate/
      dockerfile: Dockerfile
    container_name: atom-gate
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      DATABASE_URL: postgresql://atom:${POSTGRES_PASSWORD:-changeme}@postgres:5432/atom
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      OPA_BUNDLE_PATH: /policies
      JWT_PUBLIC_KEY_PATH: /etc/atom/jwt_public.pem
      ATOM_LLM_URL: http://atom-llm:4000
      ATOM_STUDIO_API_URL: http://atom-studio-api:3001
      ATOM_MEMORY_URL: http://atom-memory:8000
      KAFKA_BROKERS: redpanda:9092
      PLATFORM_HMAC_SECRET: ${PLATFORM_HMAC_SECRET:-changeme-hmac-secret}
      # Go otlptracehttp expects host:port (no scheme); WithInsecure() makes it HTTP.
      OTEL_EXPORTER_OTLP_ENDPOINT: alloy:4318
      OTEL_SERVICE_NAME: gate
    ports:
      - "8080:8080"
    volumes:
      - ./policies:/policies:ro
      - ./.keys:/etc/atom:ro

  # ── atom-llm ────────────────────────────────────────────────────────────────
  # Dev build: LiteLLM from PyPI + ATOM extensions layered via main.py (no patching).
  # Production build: change dockerfile to Dockerfile (full multi-stage build).
  atom-llm:
    build:
      context: atom-llm/
      dockerfile: Dockerfile.dev
    # image: ghcr.io/berriai/litellm:main-latest  # use this if Dockerfile.dev build fails
    container_name: atom-llm
    restart: unless-stopped
    env_file: .env
    environment:
      # LiteLLM reads CONFIG_FILE_PATH at startup to load model list and settings.
      CONFIG_FILE_PATH: /app/config.dev.yaml
      # LiteLLM creates its own tables (LiteLLM_VerificationToken etc.) in the
      # same Postgres. Our ATOM tables are unaffected — separate table names.
      DATABASE_URL: postgresql://atom:${POSTGRES_PASSWORD:-changeme}@postgres:5432/atom
      LITELLM_LOG: INFO
      # Disable spend/budget DB checks that fail on non-x86 Prisma builds
      DISABLE_SPEND_LOGS: "True"
      STORE_MODEL_IN_DB: "False"
      # OTEL tracing — send to local Alloy (port-forward from k8s) or docker-compose Alloy.
      # Python OTEL expects full URL. Use host.docker.internal to reach host port-forward.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_SERVICE_NAME: atom-llm
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      atom-studio-api:
        condition: service_healthy
    volumes:
      - ./atom-llm/config.dev.yaml:/app/config.dev.yaml:ro
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── atom-studio API (FastAPI backend) ────────────────────────────────────────
  # Built from scratch in SESSION-07. Implements auth, domains, agents, HITL, deployments.
  atom-studio-api:
    build:
      context: atom-studio/backend/
      dockerfile: Dockerfile
    container_name: atom-studio-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    env_file: .env
    environment:
      DATABASE_URL: postgresql://atom:${POSTGRES_PASSWORD:-changeme}@postgres:5432/atom?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      ATOM_LLM_URL: http://atom-llm:4000
      ATOM_RUNTIME_URL: http://atom-runtime:8090
      JWT_PRIVATE_KEY_PATH: /etc/atom/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: /etc/atom/jwt_public.pem
      KAFKA_BROKERS: redpanda:9092
      PLATFORM_HMAC_SECRET: ${PLATFORM_HMAC_SECRET:-changeme-hmac-secret}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_SERVICE_NAME: atom-studio
    ports:
      - "3001:3001"
    volumes:
      - ./.keys:/etc/atom:ro
      - ./migrations:/migrations:ro
      - ./atom-sdk/skills:/atom-sdk/skills:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  # ── atom-studio UI (React + Vite frontend) ────────────────────────────────────
  # Built from scratch in SESSION-07. Management portal UI.
  # In dev, run with: cd atom-studio/frontend && npm run dev (port 5173)
  # This service is the production nginx build. For fast iteration use npm run dev.
  atom-studio-ui:
    build:
      context: atom-studio/frontend/
      dockerfile: Dockerfile
    container_name: atom-studio-ui
    restart: unless-stopped
    depends_on:
      - atom-studio-api
    ports:
      - "3000:3000"

  # ── atom-runtime (k8s deployment controller) ─────────────────────────────────
  # Receives approved deployment requests from atom-studio and applies k8s
  # manifests to the kind cluster.
  # Requires a kubeconfig that is valid from inside the container.
  # For Docker Desktop (macOS/Windows): the kind API server is accessible via
  # host.docker.internal — update ~/.kube/config server to use that hostname
  # before mounting it here.
  atom-runtime:
    build:
      context: atom-runtime/runtime/
      dockerfile: Dockerfile
    container_name: atom-runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      atom-studio-api:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://atom:${POSTGRES_PASSWORD:-changeme}@postgres:5432/atom
      ATOM_STUDIO_API_URL: http://atom-studio-api:3001
      ATOM_RUNTIME_SELF_URL: http://atom-runtime:8090
      ATOM_GATE_CLUSTER_URL: http://host.docker.internal:8080
      # Docker backend — runs agents as containers instead of k8s pods.
      # RUNTIME_BACKEND=docker activates this mode automatically when kubeconfig is absent.
      RUNTIME_BACKEND: docker
      DOCKER_NETWORK: atom-dev_default
      DOCKER_AGENT_GATE_URL: http://gate:8080
      KAFKA_BROKERS: redpanda:9092
      # GitLab registry credentials — allows atom-runtime to pull private agent images.
      # Set GITLAB_REGISTRY_TOKEN in .env to your PAT (scope: read_registry).
      GITLAB_REGISTRY_TOKEN: ${GITLAB_REGISTRY_TOKEN:-}
      GITLAB_REGISTRY_USER: ${GITLAB_REGISTRY_USER:-oauth2}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_SERVICE_NAME: atom-runtime
    ports:
      - "8090:8090"
    volumes:
      # Docker socket — lets atom-runtime spin up agent containers directly.
      - /var/run/docker.sock:/var/run/docker.sock
      # Kubeconfig optional — only needed for k8s backend.
      # - ${KUBECONFIG:-~/.kube/config}:/root/.kube/config:ro

  # ── log-archiver (Kafka → MinIO) ─────────────────────────────────────────────
  # SESSION-14: consumes all four Kafka topics as consumer group "log-archiver"
  # and archives batched JSON lines to MinIO under atom-audit/{topic}/yyyy/mm/dd/hh/.
  log-archiver:
    build:
      context: infra/log-archiver/
      dockerfile: Dockerfile
    container_name: atom-log-archiver
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: redpanda:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-changeme}
      MINIO_BUCKET: atom-audit

  # ── Grafana Alloy (observability collector) ───────────────────────────────
  # Receives OTLP traces from all ATOM services → Tempo
  # Collects Docker container logs → Loki
  alloy:
    image: grafana/alloy:latest
    container_name: atom-alloy
    restart: unless-stopped
    command: run /etc/alloy/config.alloy --storage.path=/tmp/alloy
    depends_on:
      - loki
      - tempo
    volumes:
      - ./infra/alloy:/etc/alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP (← services send traces here)
      - "12345:12345" # Alloy UI (http://localhost:12345)

  # ── Loki (log aggregation) ────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: atom-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki

  # ── Tempo (distributed tracing) ───────────────────────────────────────────
  tempo:
    image: grafana/tempo:latest
    container_name: atom-tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API / UI
      - "4319:4317"   # OTLP gRPC (external; internal uses port 4317 directly)

  # ── Prometheus (metrics store for atom-llm + Alloy self-metrics) ─────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: atom-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: atom-grafana
    restart: unless-stopped
    depends_on:
      - loki
      - tempo
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: atom-grafana-dev
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    ports:
      - "3005:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

volumes:
  # External volume — NOT deleted by `docker compose down -v` or `make dev-down-clean`.
  # Created automatically by `make dev-up`. Use `make dev-reset-db` to wipe intentionally.
  postgres_data:
    external: true
    name: atom-postgres-data
  redis_data:
  minio_data:
  redpanda_data:
  grafana_data:
  loki_data:
  tempo_data:
  prometheus_data:
