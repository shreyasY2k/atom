version: 2

project_name: atom

# GitLab release target — used when GITLAB_TOKEN is set (GitLab CI).
# When running on GitHub Actions, GoReleaser falls back to the GitHub API automatically.
gitlab_urls:
  api: https://gitlab.com/api/v4/
  download: https://gitlab.com
  # use_job_token makes GoReleaser send CI_JOB_TOKEN via JOB-TOKEN header (not
  # PRIVATE-TOKEN). Without this, GitLab returns 404 on release artifact uploads
  # because CI_JOB_TOKEN is not a valid PRIVATE-TOKEN value.
  # GITLAB_TOKEN in the CI job is still required for GoReleaser's SCM detection.
  use_job_token: true

builds:
  - id: atom-cli
    # No dir: — use full path from repo root so GoReleaser v2 does not
    # auto-generate "cd atom-cli && go mod tidy" (which fails because
    # `cd` is not a standalone executable on Linux).
    main: ./atom-cli/cmd/atom
    binary: atom
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: atom-cli
    ids: [atom-cli]
    name_template: "atom_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - docs/DEVELOPER_GUIDE.md

checksum:
  name_template: "atom_{{ .Version }}_checksums.txt"

release:
  name_template: "ATOM v{{.Version}}"
  header: |
    ## ATOM v{{.Version}}

    ### Install

    **macOS / Linux (one-liner):**
    ```bash
    curl -fsSL https://github.com/shreyasy2k/atom/releases/latest/download/atom_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/') \
      -o /usr/local/bin/atom && chmod +x /usr/local/bin/atom
    ```

    **Go install:**
    ```bash
    go install github.com/shreyasy2k/atom/atom-cli/cmd/atom@v{{.Version}}
    ```

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
